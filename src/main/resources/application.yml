spring:
  application:
    name: khet-freshness-order-service

  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    in.agri.order: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Custom application properties
app:
  claude:
    api-key: ${CLAUDE_API_KEY}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
    api-url: ${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
    timeout-seconds: ${CLAUDE_TIMEOUT_SECONDS:30}
    max-tokens: 512

  whatsapp:
    phone-number-id: ${WA_PHONE_NUMBER_ID}
    access-token: ${WA_ACCESS_TOKEN}
    app-secret: ${WA_APP_SECRET}
    verify-token: ${WA_VERIFY_TOKEN}
    api-url: ${WA_API_URL:https://graph.facebook.com/v21.0}
    worker-phone: ${WA_WORKER_PHONE}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
    api-url: ${RAZORPAY_API_URL:https://api.razorpay.com/v1}

  timezone: Asia/Kolkata
